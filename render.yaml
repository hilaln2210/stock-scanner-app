# Render.com Blueprint - פריסה 24/7 (נייד לא תלוי במחשב)
# https://render.com/docs/blueprint-spec
# אחרי פריסה: פתח מהנייד את ה-URL ומוסיפים למסך הבית (PWA). ראה docs/DEPLOY-MOBILE.md

services:
  - type: web
    name: stock-scanner
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8000"
      - key: RENDER_EXTERNAL_URL
        value: "https://stock-scanner-app-1.onrender.com"
      # הוסף ב-Dashboard → Environment את כל משתני backend/.env (GROQ_API_KEY, GEMINI_API_KEY, FINVIZ_*, TELEGRAM_*, וכו')
