# דיפלוי אוטומטי ל-Render בכל push ל-master
# משתמש ב-Deploy Hook (מומלץ על ידי Render) — secret אחד בלבד.
# ה-CI לא ייכשל אם ה-secret חסר או אם Render מושעה (continue-on-error).

name: Deploy to Render

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    continue-on-error: true   # לא לחסום commits אם Render מושעה / secret חסר
    steps:
      - name: Check deploy hook secret
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL secret not set — skipping deploy."
            echo "כדי לפעיל deploy אוטומטי:"
            echo "1. Render Dashboard → שירות stock-scanner → Settings → Deploy Hook"
            echo "2. העתיקי את ה-URL"
            echo "3. GitHub repo → Settings → Secrets → Actions → New secret"
            echo "   name=RENDER_DEPLOY_HOOK_URL  value=<ה-URL>"
            exit 0
          fi
          echo "Deploy hook URL is set."
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Trigger Render Deploy
        if: ${{ env.RENDER_DEPLOY_HOOK_URL != '' }}
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "Triggering Render deploy via deploy hook..."
          HTTP_CODE=$(curl -s -o /tmp/render_response.txt -w "%{http_code}" "$RENDER_DEPLOY_HOOK_URL")
          echo "Response HTTP code: $HTTP_CODE"
          cat /tmp/render_response.txt | head -5
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "::warning::Deploy hook returned HTTP $HTTP_CODE (service may be suspended)."
            echo "Check Render dashboard at https://dashboard.render.com"
          else
            echo "Deploy triggered successfully. Check Render dashboard for build status."
          fi
