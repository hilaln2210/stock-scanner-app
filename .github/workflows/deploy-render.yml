# דיפלוי אוטומטי ל-Render בכל push ל-master
# משתמש ב-Deploy Hook (מומלץ על ידי Render) — secret אחד בלבד.

name: Deploy to Render

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy hook secret
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::Missing RENDER_DEPLOY_HOOK_URL."
            echo "1. Render Dashboard → your service (stock-scanner) → Settings"
            echo "2. Copy the 'Deploy Hook' URL (https://api.render.com/deploy/srv-...?key=...)"
            echo "3. GitHub repo → Settings → Secrets and variables → Actions"
            echo "4. New repository secret: name = RENDER_DEPLOY_HOOK_URL, value = the URL"
            exit 1
          fi
          echo "Deploy hook URL is set."

      - name: Trigger Render Deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "Triggering Render deploy via deploy hook..."
          HTTP_CODE=$(curl -s -o /tmp/render_response.txt -w "%{http_code}" "$RENDER_DEPLOY_HOOK_URL")
          echo "Response HTTP code: $HTTP_CODE"
          cat /tmp/render_response.txt | head -5
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "::error::Deploy hook returned HTTP $HTTP_CODE. Check RENDER_DEPLOY_HOOK_URL in GitHub Secrets (Settings → Secrets → Actions)."
            exit 1
          fi
          echo "Deploy triggered. Check Render dashboard for build status."
