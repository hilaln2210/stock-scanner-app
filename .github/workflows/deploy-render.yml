# דיפלוי אוטומטי ל-Render בכל push ל-master
# משתמש ב-Render API ישירות (RENDER_API_KEY + RENDER_SERVICE_ID ב-GitHub Secrets)

name: Deploy to Render

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "::error::Missing secrets. In repo: Settings → Secrets and variables → Actions, add RENDER_API_KEY and RENDER_SERVICE_ID."
            exit 1
          fi
          echo "Secrets present."
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

      - name: Trigger Render Deploy
        run: |
          echo "Triggering Render deploy via API..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response ($HTTP_CODE): $BODY"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "::error::Render API returned HTTP $HTTP_CODE. Check RENDER_API_KEY and RENDER_SERVICE_ID in GitHub Secrets."
            exit 1
          fi
          echo "Deploy triggered successfully. Check Render dashboard for build logs."
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
